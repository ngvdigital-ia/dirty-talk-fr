  <!-- Timer regressivo (05:00) — persiste em sessionStorage -->
  <script>
    (function(){
      var el=document.getElementById('timer');
      if(!el) return;
      var DUR=5*60*1000, KEY='dt_timer_ts';
      var start=sessionStorage.getItem(KEY);
      if(!start){ start=String(performance.timeOrigin+performance.now()); sessionStorage.setItem(KEY,start); }
      start=parseFloat(start);
      function pad(n){return String(n).padStart(2,'0');}
      function tick(){
        var now=performance.timeOrigin+performance.now();
        var left=Math.max(0, DUR-(now-start));
        var m=Math.floor(left/60000), s=Math.floor((left%60000)/1000);
        el.textContent=pad(m)+':'+pad(s);
        if(left>0) requestAnimationFrame(function(){setTimeout(tick,250);});
      }
      tick();
    })();
  </script>
